name: Build iOS 12 Legacy IPA

on:
  push:
    branches: [main]
  workflow_dispatch:  # Cho phép chạy thủ công từ GitHub UI

jobs:
  build:
    runs-on: macos-14  # macOS Sonoma runner
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Select Xcode 15
        run: |
          sudo xcode-select -s /Applications/Xcode_15.4.app || sudo xcode-select -s /Applications/Xcode_15.3.app || sudo xcode-select -s /Applications/Xcode.app
          xcodebuild -version

      - name: Install XcodeGen
        run: |
          brew untap aws/tap 2>/dev/null || true
          brew install xcodegen

      - name: Generate Xcode Project
        run: xcodegen generate

      - name: Show project structure
        run: |
          echo "=== Generated project ==="
          ls -la OcrServerLegacy.xcodeproj/
          echo "=== Source files ==="
          find OcrServerLegacy -name "*.swift" | sort

      - name: Build Archive (unsigned)
        run: |
          xcodebuild \
            -project OcrServerLegacy.xcodeproj \
            -scheme OcrServerLegacy \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $PWD/build/OcrServerLegacy.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=12.0 \
            SWIFT_VERSION=5.0 \
            | tail -50

      - name: Create IPA from Archive
        run: |
          mkdir -p build/Payload
          cp -r build/OcrServerLegacy.xcarchive/Products/Applications/*.app build/Payload/
          cd build
          zip -r OcrServerLegacy-unsigned.ipa Payload/
          ls -la OcrServerLegacy-unsigned.ipa
          echo "✅ IPA created successfully!"
          echo "📦 Size: $(du -h OcrServerLegacy-unsigned.ipa | cut -f1)"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: OcrServerLegacy-iOS12-IPA
          path: build/OcrServerLegacy-unsigned.ipa
          retention-days: 90

      - name: Build Summary
        run: |
          echo "## 📱 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Target**: iOS 12.0+" >> $GITHUB_STEP_SUMMARY
          echo "- **Architecture**: arm64" >> $GITHUB_STEP_SUMMARY
          echo "- **Signing**: Unsigned (needs re-signing)" >> $GITHUB_STEP_SUMMARY
          echo "- **IPA Size**: $(du -h build/OcrServerLegacy-unsigned.ipa | cut -f1)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📲 Cài đặt:" >> $GITHUB_STEP_SUMMARY
          echo "1. Tải file .ipa từ Artifacts bên trên" >> $GITHUB_STEP_SUMMARY
          echo "2. Dùng **Sideloadly** hoặc **AltStore** để ký và cài lên iPhone" >> $GITHUB_STEP_SUMMARY
